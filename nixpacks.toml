[phases.setup]
nixPkgs = ["python311", "postgresql"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = [
    "python manage.py collectstatic --no-input",
    "python manage.py migrate --no-input"
]

[start]
cmd = "gunicorn insurance.wsgi:application --bind 0.0.0.0:$PORT"
